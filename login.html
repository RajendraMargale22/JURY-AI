<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jury AI Legal Assistant</title>
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/auth.css">
    
    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #3b82f6;
            --accent-color: #f59e0b;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --dark-color: #1f2937;
            --light-color: #f8fafc;
            --text-primary: #374151;
            --text-secondary: #6b7280;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Animation */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('assets/images/lady-justice.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            opacity: 0.1;
            z-index: -2;
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            left: 10%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 120px;
            height: 120px;
            left: 20%;
            animation-delay: 2s;
        }

        .shape:nth-child(3) {
            width: 60px;
            height: 60px;
            left: 70%;
            animation-delay: 4s;
        }

        .shape:nth-child(4) {
            width: 100px;
            height: 100px;
            left: 80%;
            animation-delay: 6s;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
            }
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            z-index: 10;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: slideInUp 0.8s ease-out;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.1), transparent);
            transition: left 0.8s;
        }

        .login-card:hover::before {
            left: 100%;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            margin-bottom: 30px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(30, 58, 138, 0.3);
            animation: pulse 2s infinite;
        }

        .logo i {
            font-size: 2.5rem;
            color: white;
            animation: balance 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes balance {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .brand-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 5px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 30px;
        }

        .login-tabs {
            display: flex;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 30px;
        }

        .tab-button {
            flex: 1;
            padding: 12px 20px;
            background: none;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .tab-button.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            box-shadow: 0 5px 15px rgba(30, 58, 138, 0.4);
            transform: translateY(-2px);
        }

        .tab-button:hover:not(.active) {
            color: var(--primary-color);
            background: rgba(30, 58, 138, 0.1);
        }

        .form-group {
            position: relative;
            margin-bottom: 25px;
        }

        .form-control {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(59, 130, 246, 0.2);
            border-radius: 15px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
            color: var(--text-primary);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
            background: white;
            transform: translateY(-2px);
        }

        .form-control::placeholder {
            color: var(--text-secondary);
            opacity: 0.8;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .password-toggle:hover {
            color: var(--primary-color);
            transform: translateY(-50%) scale(1.1);
        }

        .login-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s;
        }

        .login-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(30, 58, 138, 0.4);
        }

        .login-button:hover::before {
            left: 100%;
        }

        .login-button:active {
            transform: translateY(-1px);
        }

        .divider {
            position: relative;
            text-align: center;
            margin: 25px 0;
            color: var(--text-secondary);
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(107, 114, 128, 0.3), transparent);
        }

        .divider span {
            background: rgba(255, 255, 255, 0.9);
            padding: 0 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .social-login {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-button {
            flex: 1;
            padding: 12px;
            border: 2px solid rgba(107, 114, 128, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .social-button:hover {
            border-color: var(--secondary-color);
            color: var(--primary-color);
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-decoration: none;
        }

        .google { color: #db4437; }
        .microsoft { color: #00bcf2; }

        .forgot-password {
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--primary-color);
            text-decoration: underline;
        }

        .register-link {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(107, 114, 128, 0.2);
            color: var(--text-secondary);
            font-size: 14px;
        }

        .register-link a {
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .register-link a:hover {
            color: var(--primary-color);
            text-decoration: underline;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .loading {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .admin-panel-link {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .admin-panel-link:hover {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            transform: translateY(-2px);
            text-decoration: none;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .login-container {
                padding: 15px;
                max-width: 100%;
            }
            
            .login-card {
                padding: 30px 25px;
                margin: 20px 0;
            }
            
            .brand-title {
                font-size: 1.5rem;
            }
            
            .social-login {
                flex-direction: column;
            }
            
            .admin-panel-link {
                position: static;
                display: block;
                margin: 20px auto 0;
                width: fit-content;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 25px 20px;
                border-radius: 15px;
            }
            
            .logo {
                width: 60px;
                height: 60px;
            }
            
            .logo i {
                font-size: 2rem;
            }
            
            .tab-button {
                padding: 10px 15px;
                font-size: 14px;
            }
        }

        /* Disable text selection */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        input, textarea {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }
    </style>
</head>
<body>
    <!-- Floating Background Shapes -->
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <!-- Admin Panel Link -->
    <a href="admin.html" class="admin-panel-link">
        <i class="fas fa-cog me-2"></i>Admin Panel
    </a>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo">
                    <i class="fas fa-balance-scale"></i>
                </div>
                <h1 class="brand-title">Jury AI</h1>
                <p class="brand-subtitle">Legal Assistant Platform</p>
            </div>

            <!-- Login Tabs -->
            <div class="login-tabs">
                <button class="tab-button active" data-tab="user">
                    <i class="fas fa-user me-2"></i>User Login
                </button>
                <button class="tab-button" data-tab="lawyer">
                    <i class="fas fa-user-tie me-2"></i>Lawyer Login
                </button>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span id="errorText">Invalid credentials. Please try again.</span>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <input type="email" class="form-control" id="email" placeholder="Email Address" required>
                </div>
                
                <div class="form-group">
                    <input type="password" class="form-control" id="password" placeholder="Password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i class="fas fa-eye" id="passwordToggleIcon"></i>
                    </button>
                </div>
                
                <button type="submit" class="login-button">
                    <div class="loading" id="loginLoading"></div>
                    <span id="loginButtonText">Sign In</span>
                </button>
            </form>

            <!-- Forgot Password -->
            <div class="text-center mb-3">
                <a href="#" class="forgot-password" onclick="showForgotPassword()">Forgot your password?</a>
            </div>

            <!-- Divider -->
            <div class="divider">
                <span>Or continue with</span>
            </div>

            <!-- Social Login -->
            <div class="social-login">
                <a href="#" class="social-button" onclick="loginWithGoogle()">
                    <i class="fab fa-google google"></i>
                    <span>Google</span>
                </a>
                <a href="#" class="social-button" onclick="loginWithMicrosoft()">
                    <i class="fab fa-microsoft microsoft"></i>
                    <span>Microsoft</span>
                </a>
            </div>

            <!-- Register Link -->
            <div class="register-link">
                Don't have an account? 
                <a href="register.html" id="registerLink">Create Account</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JavaScript -->
    <script>
        // Disable right-click and keyboard shortcuts
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('keydown', (e) => {
            if (e.keyCode === 123 || 
                (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) ||
                (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83))) {
                e.preventDefault();
                return false;
            }
        });

        // Global Variables
        let currentUserType = 'user';

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            initializePage();
            setupEventListeners();
        });

        function initializePage() {
            // Check if user is already logged in
            const userToken = localStorage.getItem('userToken');
            if (userToken && validateToken(userToken)) {
                window.location.href = 'index.html';
                return;
            }

            // Set focus on email field
            document.getElementById('email').focus();
        }

        function setupEventListeners() {
            // Tab switching
            document.querySelectorAll('.tab-button').forEach(button => {
                button.addEventListener('click', handleTabSwitch);
            });

            // Form submission
            document.getElementById('loginForm').addEventListener('submit', handleLogin);

            // Enter key navigation
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && e.target.tagName !== 'BUTTON') {
                    const form = document.getElementById('loginForm');
                    if (form.checkValidity()) {
                        form.requestSubmit();
                    }
                }
            });
        }

        function handleTabSwitch(e) {
            const tabType = e.target.closest('.tab-button').dataset.tab;
            
            // Update active tab
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            e.target.closest('.tab-button').classList.add('active');
            
            // Update current user type
            currentUserType = tabType;
            
            // Update register link
            const registerLink = document.getElementById('registerLink');
            registerLink.href = tabType === 'lawyer' ? 'register.html?type=lawyer' : 'register.html';
            
            // Clear form
            document.getElementById('loginForm').reset();
            hideError();
        }

        function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }

            if (!validateEmail(email)) {
                showError('Please enter a valid email address');
                return;
            }

            showLoading(true);
            
            // Simulate API call
            setTimeout(() => {
                authenticateUser(email, password);
            }, 1500);
        }

        function authenticateUser(email, password) {
            // Demo credentials for different user types
            const credentials = {
                user: {
                    'user@juryai.com': 'user123',
                    'demo@user.com': 'demo123'
                },
                lawyer: {
                    'lawyer@juryai.com': 'lawyer123',
                    'advocate@legal.com': 'legal123'
                }
            };

            const userCreds = credentials[currentUserType];
            
            if (userCreds && userCreds[email] === password) {
                // Successful login
                const token = generateToken(email, currentUserType);
                localStorage.setItem('userToken', token);
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userType', currentUserType);
                
                showLoading(false);
                showSuccess('Login successful! Redirecting...');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                // Failed login
                showLoading(false);
                showError('Invalid email or password. Please try again.');
                
                // Shake animation
                document.querySelector('.login-card').style.animation = 'shake 0.5s ease-in-out';
                setTimeout(() => {
                    document.querySelector('.login-card').style.animation = 'slideInUp 0.8s ease-out';
                }, 500);
            }
        }

        function generateToken(email, type) {
            const payload = {
                email: email,
                type: type,
                exp: Math.floor(Date.now() / 1000) + (60 * 60 * 24 * 7) // 7 days
            };
            
            return 'header.' + btoa(JSON.stringify(payload)) + '.signature';
        }

        function validateToken(token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                return payload.exp > Date.now() / 1000;
            } catch (e) {
                return false;
            }
        }

        function validateEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        function togglePassword() {
            const passwordField = document.getElementById('password');
            const toggleIcon = document.getElementById('passwordToggleIcon');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordField.type = 'password';
                toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function showLoading(show) {
            const loading = document.getElementById('loginLoading');
            const buttonText = document.getElementById('loginButtonText');
            const button = document.querySelector('.login-button');
            
            if (show) {
                loading.style.display = 'inline-block';
                buttonText.textContent = 'Signing In...';
                button.disabled = true;
                button.style.opacity = '0.8';
            } else {
                loading.style.display = 'none';
                buttonText.textContent = 'Sign In';
                button.disabled = false;
                button.style.opacity = '1';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            
            errorText.textContent = message;
            errorDiv.style.display = 'block';
            
            setTimeout(hideError, 5000);
        }

        function hideError() {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';
        }

        function showSuccess(message) {
            // Create success notification
            const successDiv = document.createElement('div');
            successDiv.className = 'error-message';
            successDiv.style.cssText = 'background: rgba(16, 185, 129, 0.1); color: #10b981; display: block;';
            successDiv.innerHTML = `<i class="fas fa-check-circle me-2"></i><span>${message}</span>`;
            
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.parentNode.insertBefore(successDiv, errorDiv);
            
            setTimeout(() => {
                successDiv.remove();
            }, 3000);
        }

        function showForgotPassword() {
            alert('Forgot Password functionality will be implemented. For demo, use:\n\nUser: user@juryai.com / user123\nLawyer: lawyer@juryai.com / lawyer123');
        }

        function loginWithGoogle() {
            alert('Google OAuth integration will be implemented in production.');
        }

        function loginWithMicrosoft() {
            alert('Microsoft OAuth integration will be implemented in production.');
        }

        // Auto-resize text areas and inputs
        function autoResize() {
            document.querySelectorAll('input, textarea').forEach(element => {
                element.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = this.scrollHeight + 'px';
                });
            });
        }

        console.log('✅ Jury AI Login Page loaded successfully');
        console.log('Demo Credentials:');
        console.log('User: user@juryai.com / user123');
        console.log('Lawyer: lawyer@juryai.com / lawyer123');
    </script>
    
    <!-- Custom Auth JS -->
    <script src="js/auth.js"></script>
</body>
</html>
