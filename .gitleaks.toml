title = "JURY-AI Gitleaks Config"

[extend]
useDefault = true

[allowlist]
description = "Allow known placeholders and sample tokens"
regexes = [
  '''PASTE_YOUR_FIREBASE_PRIVATE_KEY_HERE''',
  '''your-firebase-web-api-key''',
  '''your-super-secret-jwt-key-change-this-in-production''',
  '''your-pinecone-api-key''',
  '''your_google_gemini_api_key''',
  '''your-news-api-key''',
  '''example|placeholder|changeme'''
]
paths = [
  '''(^|/)node_modules/''',
  '''(^|/)venv/''',
  '''(^|/)\.venv/''',
  '''(^|/)dist/''',
  '''(^|/)build/''',
  '''(^|/)__pycache__/'''
]
