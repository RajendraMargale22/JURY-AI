services:
  - type: web
    runtime: static
    name: jury-ai-frontend
    plan: free
    rootDir: jury-ai-app/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: REACT_APP_API_URL
        value: https://jury-ai-backend.onrender.com/api
      - key: REACT_APP_CONTRACT_REVIEW_API_URL
        value: https://jury-ai-contract-review.onrender.com
      - key: REACT_APP_CONTRACT_REVIEW_API_KEY
        sync: false
      - key: REACT_APP_FIREBASE_API_KEY
        sync: false
      - key: REACT_APP_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: REACT_APP_FIREBASE_PROJECT_ID
        sync: false
      - key: REACT_APP_FIREBASE_APP_ID
        sync: false
      - key: REACT_APP_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: REACT_APP_NEWS_API_KEY
        sync: false

  - type: web
    name: jury-ai-backend
    runtime: node
    plan: free
    rootDir: jury-ai-app/backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://jury-ai-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://jury-ai-frontend.onrender.com
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false

  - type: web
    name: jury-ai-chatbot
    runtime: python
    plan: free
    rootDir: chatbot-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: CORS_ORIGINS
        value: https://jury-ai-frontend.onrender.com,https://jury-ai-backend.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: MAX_UPLOAD_FILES
        value: 10
      - key: MAX_UPLOAD_BYTES
        value: 10485760
      - key: MAX_QUESTION_CHARS
        value: 2000
      - key: VECTOR_TOP_K
        value: 5

  - type: web
    name: jury-ai-contract-review
    runtime: python
    plan: free
    rootDir: contract-review-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: PORT
        value: 8001
      - key: CORS_ORIGINS
        value: https://jury-ai-frontend.onrender.com,https://jury-ai-backend.onrender.com
      - key: CONTRACT_REVIEW_API_KEYS
        sync: false
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: 60
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 60
      - key: USE_LEGACY_CONTRACT_REVIEW
        value: false
